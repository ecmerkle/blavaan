        href: articles/plotting.html
    examples:
      text: Examples/Details
      menu:
      - text: Estimation with Ordinal Data
        href: articles/ordinal.html
      - text: Two-level Estimation
        href: articles/multilevel.html
      - text: Measurement Invariance
        href: articles/invariance.html
      - text: Approximate Fit Indices
        href: articles/approx_fi.html
      - text: Model Comparison
        href: articles/model_comparison.html
      - text: Cross-loadings with Strong Priors
        href: articles/cross_loadings_strong_priors.html
